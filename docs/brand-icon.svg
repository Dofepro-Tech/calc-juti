    <path d="M228 160h15" stroke="#82d8ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M235 153v14" stroke="#82d8ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M235 68a1.5 1.5 0 1 1 0 .01" stroke="#c6b4ff" stroke-width="3" stroke-linecap="round"/>
  </g>

