        <text x="163.5" y="136">9</text>
        <text x="87.5" y="162">4</text>
        <text x="125.5" y="162">5</text>
        <text x="163.5" y="162">6</text>
        <text x="87.5" y="188">1</text>
        <text x="125.5" y="188">2</text>
