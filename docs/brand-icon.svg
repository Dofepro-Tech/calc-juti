<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Calc Juti</title>
  <desc id="desc">Calculator app icon adapted as a lightweight SVG.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f59d0"/>
      <stop offset="0.55" stop-color="#2935a6"/>
      <stop offset="1" stop-color="#30005b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ffcff"/>
      <stop offset="1" stop-color="#36cce9"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2467c8"/>
      <stop offset="1" stop-color="#0d356f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8feff"/>
      <stop offset="1" stop-color="#d6ebff"/>
