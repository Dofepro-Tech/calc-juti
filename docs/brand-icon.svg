      <stop offset="1" stop-color="#1899d5"/>
    </linearGradient>
    <linearGradient id="clear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6f8c"/>
      <stop offset="1" stop-color="#e21b56"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0c0830" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="236" height="236" rx="38" fill="url(#bg)"/>
