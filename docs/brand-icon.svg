        <rect x="147" y="122" width="33" height="21" rx="8"/>
        <rect x="71" y="148" width="33" height="21" rx="8"/>
        <rect x="109" y="148" width="33" height="21" rx="8"/>
        <rect x="147" y="148" width="33" height="21" rx="8"/>
        <rect x="71" y="174" width="33" height="21" rx="8"/>
        <rect x="109" y="174" width="33" height="21" rx="8"/>
        <rect x="147" y="174" width="33" height="21" rx="8"/>
        <rect x="109" y="200" width="33" height="21" rx="8"/>
        <rect x="147" y="200" width="33" height="21" rx="8"/>
